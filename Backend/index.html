<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager API Service</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 500px;
            border: 1px solid #334155;
        }
        .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        h1 {
            color: var(--accent-color);
            margin-top: 0;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        p {
            color: var(--text-muted);
            line-height: 1.6;
            font-size: 16px;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            background: #0284c7;
            color: white;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 4px 12px rgba(2, 132, 199, 0.3);
        }
        .btn:hover {
            background: #0369a1;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(2, 132, 199, 0.4);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">⚙️</div>
        <h1>Task Manager API is Live</h1>
        <p>Welcome! This is a production-deployed REST API service built with Node.js, Express, and MongoDB, featuring robust Role-Based Access Control (RBAC) security.</p>
        <a href="/docs" class="btn">Explore Interactive API Docs</a>
    </div>
</body>
</html>
